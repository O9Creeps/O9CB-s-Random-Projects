<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>butons</title>
        <style>
            html {
                background-color: #004422;
                color: #0fffff;
            }
            small {
                color: #0fffff;
            }
            body {
                display: flex;
                min-height: 100vh;
                flex-direction: column;
                margin-top: auto;
                overflow: hidden;
                justify-content: center; /* Center horizontally */
                align-items: center;     /* Center vertically */
            }
            .game {
                flex: 1;
            }
            .container {
                position: relative;
                width: 500px;
                height: 500px;
                border: 2px solid #ccc;
                background-color: #f0f0f077;
                color: #00f
            }
            #movingButton {
                position: absolute;
                top: 0px; /* init pos */
                left: 0px; /* INIT POS */
                padding: 10px 20px;
                cursor: pointer;
                background-color: #007bff;
                color: white;
                border: none;
                border-radius: 5px;
                /* transition for smooth glide */
                transition: top 0.5s ease-out, left 0.5s ease-out;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <button id="movingButton" onclick="butonclink(this)">Clicenk Me</button>
        </div>
        <script>
            function butonclink(clicked) {
                moveButton(clicked);

                if (Math.random() < 0.9) {
                    newbtn();
                }
            }
            function newbtn() {
                console.warn("what");
                const container = document.getElementByClassName('container');
                const newBtn = document.createElement('button');
                
                newBtn.className = 'movingButton';
                newBtn.innerHTML = 'Im your replacement! haha!';
                
                newBtn.onclick = function() { butonclink(this); };
                
                container.appendChild(newBtn);
                moveButton(newBtn);
            }
            function moveButton(btn) {
                const container = document.querySelector('.container');
            
                // sense bounds
                const containerWidth = container.clientWidth;
                const containerHeight = container.clientHeight;
                const buttonWidth = btn.offsetWidth;
                const buttonHeight = btn.offsetHeight;

                // get random pos
                const randomX = Math.floor(Math.random() * (containerWidth - buttonWidth));
                const randomY = Math.floor(Math.random() * (containerHeight - buttonHeight));

                // apply pos
                btn.style.left = randomX + 'px';
                btn.style.top = randomY + 'px';
            }
        </script>
    </body>
    <footer>
        <small>i have no idea what this is</small>
    </footer>
</html>
