<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>butons</title>
        <style>
            html {
                background-color: #004422;
                color: #0fffff;
            }
            small {
                color: #0fffff;
            }
            body, html {
                display: flex;
                min-height: 100vh;
                flex-direction: column;
                margin-top: auto;
                overflow: hidden;
            }
            .game {
                flex: 1;
            }
            .container {
                position: relative;
                width: 500px;
                height: 500px;
                border: 2px solid #ccc;
                background-color: #f0f0f0;
            }
            #movingButton {
                position: absolute;
                top: 0px; /* Initial position */
                left: 0px; /* Initial position */
                padding: 10px 20px;
                cursor: pointer;
                background-color: #007bff;
                color: white;
                border: none;
                border-radius: 5px;
                /* Add the CSS transition for a smooth glide */
                transition: top 0.5s ease-out, left 0.5s ease-out;
            }
        </style>
    </head>
    <body>
        <div class="game">
            <p>3</p>
        </div>
    </body>
    <footer>
        <small>i have no idea what this is</small>
    </footer>
</html>
